###
# Minimal INI for the example app (no database, no external services).
###

[app:main]
use = egg:pyramid-client-builder#example
pyramid.reload_templates = false

[server:main]
use = egg:waitress#main
listen = localhost:6543

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
