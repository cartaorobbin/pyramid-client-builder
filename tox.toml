requires = ["tox-uv>=1.25"]
env_list = ["lint", "py310", "py311", "py312", "py313"]

[env_run_base]
runner = "uv-venv-lock-runner"
dependency_groups = ["dev"]
commands = [["pytest", "--ignore=tests/test_smoke.py"]]

[env.lint]
runner = "uv-venv-lock-runner"
dependency_groups = ["dev"]
commands = [
    ["ruff", "check", "."],
    ["black", "--check", "."],
]
